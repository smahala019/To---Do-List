 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-gradient bg-gradient-1"></div>
  <div class="bg-gradient bg-gradient-2"></div>
  <div class="grid-pattern"></div>

  <div class="theme-toggle">
    <button class="icon-btn" id="exportBtn" aria-label="Export Data">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
    </button>
    <button class="icon-btn" id="importBtn" aria-label="Import Data">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
    </button>
    <input type="file" id="fileImport" accept=".json" style="display:none">
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>

  <div class="container">
    <header class="header">
      <h1>To-Do Pro</h1>
      <p>Track your progress, add notes, and master your tasks step by step.</p>
    </header>

    <section class="progress-section">
      <div class="progress-header">
        <span class="progress-title">Overall Progress</span>
        <div class="progress-stats">
          <div class="stat">
            <div class="stat-value" id="completedDays">0</div>
            <div class="stat-label">Days Done</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="totalXP">0</div>
            <span class="level-badge" id="levelBadge">Lv. 1</span>
            <div class="stat-label">Total XP</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="streakCount">0</div>
            <div class="stat-label">Day Streak</div>
          </div>
        </div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar" style="width: 0%"></div>
      </div>
      
      <!-- Heatmap -->
      <div class="heatmap-container">
        <div class="heatmap-title">Activity Overview</div>
        <div class="heatmap-grid" id="heatmapGrid"></div>
      </div>
    </section>

    <div class="week-tabs" id="weekTabsContainer" role="tablist">
      <!-- Tabs generated by JS -->
    </div>

    <div class="task-input-section" id="customInputSection" style="display: none;">
      <input type="text" class="task-input" id="dayTitleInput" placeholder="New Day Title (e.g. Day 31: Advanced Py)" aria-label="Day Title">
      <input type="text" class="task-input" id="taskInput" placeholder="First task description..." aria-label="Task input" style="flex: 2;">
      <button class="add-btn" id="addBtn">Create Day</button>
    </div>

    <div id="daysContainer"></div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-content">
      <h3 class="modal-title">Delete Task Day</h3>
      <p class="modal-text">Are you sure you want to delete this day and all its tasks? This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="cancelDelete">Cancel</button>
        <button class="modal-btn modal-btn-delete" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
